<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자 크기 비교하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 효과음 함수들 (제공해주신 코드 그대로 유지)
        const playTadaSound = () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const playNote = (frequency, startTime, duration, type = 'sine') => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = type;
                    oscillator.frequency.value = frequency;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    gainNode.gain.setValueAtTime(0.1, startTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    oscillator.start(startTime);
                    oscillator.stop(startTime + duration);
                };
                const now = audioCtx.currentTime;
                playNote(523.25, now, 0.2, 'triangle'); 
                playNote(659.25, now, 0.2, 'triangle'); 
                playNote(659.25, now + 0.2, 0.6, 'triangle'); 
                playNote(783.99, now + 0.2, 0.6, 'triangle'); 
                playNote(1046.50, now + 0.2, 0.6, 'triangle');
            } catch (e) { console.log("오디오 재생 불가", e); }
        };

        const playErrorSound = () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) { console.log("오디오 재생 불가", e); }
        };

        // 숫자 생성 로직
        const generateSimilarNumbers = () => {
            let num1 = Math.floor(Math.random() * 9000) + 1000;
            let num2;
            const rand = Math.random();
            if (rand < 0.20) {
                num2 = Math.random() > 0.5 ? Math.floor(num1 / 10) : num1 * 10 + Math.floor(Math.random() * 10);
            } else if (rand < 0.35) {
                num2 = num1;
            } else if (rand < 0.65) {
                let str1 = num1.toString();
                const swapIdx = Math.floor(Math.random() * 3);
                let arr = str1.split('');
                let temp = arr[swapIdx];
                arr[swapIdx] = arr[swapIdx + 1];
                arr[swapIdx + 1] = temp;
                num2 = parseInt(arr.join(''), 10);
                if (num1 === num2) num2 += 1;
            } else {
                let diffs = [1, 10, 100, 1000];
                let diff = diffs[Math.floor(Math.random() * diffs.length)];
                num2 = num1 + (Math.random() > 0.5 ? diff : -diff);
            }
            if (num2 <= 0) num2 = 100;
            return Math.random() > 0.5 ? [num2, num1] : [num1, num2];
        };

        const TIME_LIMIT = 100;
        const TOTAL_QUESTIONS = 10;

        function App() {
            const [gameState, setGameState] = useState('start');
            const [num1, setNum1] = useState(0);
            const [num2, setNum2] = useState(0);
            const [attempts, setAttempts] = useState(0);
            const [history, setHistory] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [feedbackStatus, setFeedbackStatus] = useState(''); 
            const [timeLeft, setTimeLeft] = useState(TIME_LIMIT); 
            const timerRef = useRef(null);

            useEffect(() => { return () => clearInterval(timerRef.current); }, []);

            const startGame = () => {
                setHistory([]);
                setGameState('playing');
                initNewProblem();
            };

            const startTimer = () => {
                clearInterval(timerRef.current);
                setTimeLeft(TIME_LIMIT);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timerRef.current);
                            handleTimeOut();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 100);
            };

            const initNewProblem = () => {
                const [n1, n2] = generateSimilarNumbers();
                setNum1(n1); setNum2(n2);
                setAttempts(0);
                startTimer();
            };

            const handleTimeOut = () => {
                playErrorSound();
                setAttempts(prev => prev + 1);
                setFeedbackStatus('timeout');
                setShowFeedback(true);
                setTimeout(() => { setShowFeedback(false); startTimer(); }, 1000);
            };

            const handleAnswer = (operator) => {
                clearInterval(timerRef.current);
                let isCorrect = (operator === '>' && num1 > num2) || (operator === '=' && num1 === num2) || (operator === '<' && num1 < num2);
                if (isCorrect) {
                    playTadaSound();
                    setFeedbackStatus('correct');
                    setShowFeedback(true);
                    let mark = attempts === 0 ? 'O' : attempts === 1 ? '△' : 'X';
                    const newHistory = [...history, mark];
                    setHistory(newHistory);
                    setTimeout(() => {
                        setShowFeedback(false);
                        if (newHistory.length >= TOTAL_QUESTIONS) setGameState('end');
                        else initNewProblem();
                    }, 1500);
                } else {
                    playErrorSound();
                    setAttempts(prev => prev + 1);
                    setFeedbackStatus('incorrect');
                    setShowFeedback(true);
                    setTimeout(() => { setShowFeedback(false); startTimer(); }, 1000);
                }
            };

            const getMarkColor = (mark) => mark === 'O' ? 'text-green-500' : mark === '△' ? 'text-yellow-500' : 'text-red-500';
            const calculateScore = () => history.reduce((acc, mark) => acc + (mark === 'O' ? 10 : mark === '△' ? 5 : 0), 0);
            const timerColor = timeLeft > 50 ? 'bg-green-400' : timeLeft > 20 ? 'bg-orange-400' : 'bg-red-500';

            if (gameState === 'start') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4">
                        <h1 className="text-5xl font-black text-indigo-900 mb-6">숫자 크기 비교하기</h1>
                        <p className="text-xl text-indigo-600 font-bold mb-12">총 {TOTAL_QUESTIONS}문제! 시간 안에 비교하세요!</p>
                        <button onClick={startGame} className="px-10 py-5 bg-blue-600 hover:bg-blue-700 text-white text-3xl font-black rounded-full shadow-xl transform transition hover:scale-105">시작하기!</button>
                    </div>
                );
            }

            if (gameState === 'end') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4">
                        <h1 className="text-5xl font-black text-indigo-900 mb-6">게임 종료!</h1>
                        <div className="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-xl w-full">
                            <h2 className="text-3xl font-bold text-gray-700 mb-4">최종 점수</h2>
                            <div className="text-7xl font-black text-blue-600 mb-8">{calculateScore()}점</div>
                            <div className="flex flex-wrap gap-3 justify-center mb-10">
                                {history.map((mark, i) => <span key={i} className={`text-4xl font-black ${getMarkColor(mark)}`}>{mark}</span>)}
                            </div>
                            <button onClick={startGame} className="px-8 py-4 bg-green-500 hover:bg-green-600 text-white text-2xl font-black rounded-2xl w-full">다시 하기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-3 bg-gray-200">
                        <div className={`h-full ${timerColor} transition-all duration-100 ease-linear`} style={{ width: `${(timeLeft / TIME_LIMIT) * 100}%` }} />
                    </div>
                    <div className="absolute top-12 text-center">
                        <h1 className="text-3xl font-black text-indigo-900">숫자 크기 비교하기</h1>
                        <p className="text-indigo-600 font-bold">진행 상황: {history.length + 1} / {TOTAL_QUESTIONS}</p>
                    </div>
                    <div className="flex flex-col md:flex-row items-center justify-center gap-10 w-full max-w-5xl">
                        <div className="bg-white shadow-2xl rounded-3xl p-8 w-64 flex justify-center border-b-8 border-indigo-200"><span className="text-7xl font-black text-gray-800">{num1}</span></div>
                        <div className="flex flex-row md:flex-col gap-4">
                            <button onClick={() => handleAnswer('>')} className="w-20 h-20 bg-blue-500 text-white text-4xl font-black rounded-2xl shadow-lg">&gt;</button>
                            <button onClick={() => handleAnswer('=')} className="w-20 h-20 bg-green-500 text-white text-4xl font-black rounded-2xl shadow-lg">=</button>
                            <button onClick={() => handleAnswer('<')} className="w-20 h-20 bg-orange-500 text-white text-4xl font-black rounded-2xl shadow-lg">&lt;</button>
                        </div>
                        <div className="bg-white shadow-2xl rounded-3xl p-8 w-64 flex justify-center border-b-8 border-orange-200"><span className="text-7xl font-black text-gray-800">{num2}</span></div>
                    </div>
                    {showFeedback && (
                        <div className="absolute inset-0 flex items-center justify-center bg-white/70 backdrop-blur-sm z-50">
                            <div className="text-6xl font-black text-green-500 animate-bounce">
                                {feedbackStatus === 'correct' ? '정답입니다! 🎉' : feedbackStatus === 'incorrect' ? '다시해보세요! 💦' : '시간 초과! ⏰'}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
