<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자 크기 비교하기 - 현도초</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f7ff; }
        .feedback-overlay { pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 효과음 함수
        const playSound = (type) => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'correct') {
                    const now = audioCtx.currentTime;
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        gain.gain.setValueAtTime(0.1, now + (i*0.1));
                        gain.gain.exponentialRampToValueAtTime(0.001, now + (i*0.1) + 0.4);
                        osc.start(now + (i*0.1)); osc.stop(now + (i*0.1) + 0.4);
                    });
                } else {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch (e) { console.log(e); }
        };

        const generateNumbers = () => {
            let n1 = Math.floor(Math.random() * 9000) + 1000;
            let n2 = Math.floor(Math.random() * 9000) + 1000;
            if (Math.random() > 0.7) n2 = n1; // 30% 확률로 같게
            return Math.random() > 0.5 ? [n1, n2] : [n2, n1];
        };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [nums, setNums] = useState([0, 0]);
            const [history, setHistory] = useState([]);
            const [attempts, setAttempts] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [timeLeft, setTimeLeft] = useState(100);
            const timerRef = useRef(null);

            const startTimer = () => {
                clearInterval(timerRef.current);
                setTimeLeft(100);
                timerRef.current = setInterval(() => {
                    setTimeLeft(p => {
                        if (p <= 1) { clearInterval(timerRef.current); handleResult('timeout'); return 0; }
                        return p - 1;
                    });
                }, 100);
            };

            const nextProblem = () => {
                setNums(generateNumbers());
                setAttempts(0);
                startTimer();
            };

            const handleResult = (type) => {
                if (feedback) return;
                setFeedback(type);
                if (type === 'correct') {
                    playSound('correct');
                    const mark = attempts === 0 ? 'O' : (attempts === 1 ? '△' : 'X');
                    const newHistory = [...history, mark];
                    setHistory(newHistory);
                    setTimeout(() => {
                        setFeedback(null);
                        if (newHistory.length >= 10) setGameState('end');
                        else nextProblem();
                    }, 1500);
                } else {
                    playSound('error');
                    setAttempts(prev => prev + 1);
                    setTimeout(() => { setFeedback(null); startTimer(); }, 1000);
                }
            };

            const checkAnswer = (op) => {
                const [n1, n2] = nums;
                const isCorrect = (op === '>' && n1 > n2) || (op === '=' && n1 === n2) || (op === '<' && n1 < n2);
                handleResult(isCorrect ? 'correct' : 'incorrect');
            };

            if (gameState === 'start') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <h1 className="text-5xl font-black text-indigo-900 mb-8">숫자 크기 비교</h1>
                    <button onClick={() => { setHistory([]); setGameState('playing'); nextProblem(); }} className="px-12 py-6 bg-blue-600 text-white text-3xl font-black rounded-full shadow-2xl transition-transform hover:scale-105 active:scale-95">게임 시작!</button>
                </div>
            );

            if (gameState === 'end') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-lg w-full">
                        <h1 className="text-4xl font-black mb-6 text-indigo-900">결과 리포트</h1>
                        <div className="text-7xl font-black text-blue-600 mb-6">{history.reduce((a, m) => a + (m === 'O' ? 10 : (m === '△' ? 5 : 0)), 0)}점</div>
                        <div className="flex flex-wrap gap-2 justify-center mb-8">
                            {history.map((m, i) => <span key={i} className={`text-3xl font-bold ${m === 'O' ? 'text-green-500' : (m === '△' ? 'text-yellow-500' : 'text-red-500')}`}>{m}</span>)}
                        </div>
                        <button onClick={() => setGameState('start')} className="w-full py-4 bg-green-500 text-white text-2xl font-bold rounded-2xl">다시 하기</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative">
                    <div className="absolute top-0 left-0 w-full h-3 bg-gray-200">
                        <div className={`h-full transition-all duration-100 ${timeLeft > 50 ? 'bg-green-400' : 'bg-red-500'}`} style={{ width: `${timeLeft}%` }} />
                    </div>

                    <div className="flex flex-col md:flex-row items-center gap-8 mb-20">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-64 text-center border-b-8 border-indigo-200"><span className="text-7xl font-black">{nums[0]}</span></div>
                        <div className="flex flex-row md:flex-col gap-4">
                            {['>', '=', '<'].map(op => <button key={op} onClick={() => checkAnswer(op)} className="w-20 h-20 bg-blue-500 text-white text-4xl font-black rounded-2xl shadow-lg active:scale-90 transition-transform">{op}</button>)}
                        </div>
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-64 text-center border-b-8 border-orange-200"><span className="text-7xl font-black">{nums[1]}</span></div>
                    </div>

                    {feedback && (
                        <div className="absolute inset-0 flex items-center justify-center bg-white/60 backdrop-blur-sm z-50 feedback-overlay">
                            <div className={`text-6xl font-black ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'} animate-bounce`}>
                                {feedback === 'correct' ? '정답입니다! 🎉' : (feedback === 'timeout' ? '시간 초과! ⏰' : '다시 해보세요! 💦')}
                            </div>
                        </div>
                    )}

                    {/* 하단 기록 바 (이 부분이 확실히 보이도록 수정됨) */}
                    <div className="fixed bottom-10 w-full max-w-2xl px-6">
                        <div className="bg-white/80 backdrop-blur p-4 rounded-2xl shadow-lg border border-indigo-100">
                            <p className="text-center text-indigo-400 font-bold mb-2">실시간 학습 기록 ({history.length}/10)</p>
                            <div className="flex flex-wrap gap-3 justify-center min-h-[40px]">
                                {history.map((m, i) => <span key={i} className={`text-3xl font-black ${m === 'O' ? 'text-green-500' : (m === '△' ? 'text-yellow-500' : 'text-red-500')}`}>{m}</span>)}
                                {history.length === 0 && <span className="text-gray-300">문제를 풀면 여기에 기록됩니다</span>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
